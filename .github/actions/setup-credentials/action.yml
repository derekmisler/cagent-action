name: 'Setup Credentials'
description: 'Fetch credentials from AWS Secrets Manager via OIDC and generate GitHub App token'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'

    - name: Fetch credentials
      shell: bash
      run: node "$GITHUB_ACTION_PATH/../../../dist/credentials.js"

    - name: Verify credentials were obtained
      shell: bash
      run: |
        if [ -z "$GITHUB_APP_TOKEN" ]; then
          echo "::error::GITHUB_APP_TOKEN was not set — setup-credentials failed silently."
          exit 1
        fi
